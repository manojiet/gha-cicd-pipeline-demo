name: run test
on:
  push:
    branches: [main]
    path_ignore:  
    - ".github/workflows**"
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Cloning the repository
      uses: actions/checkout@v6
    - name: Setup Node.js and install dependencies
      uses: ./.github/action/setupnode
      with:
        node-version: 20
    - name: Run tests
      run: npm test
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Cloning the repository
        uses: actions/checkout@v6
      - name: Setup Node.js and install dependencies
        uses: ./.github/action/setupnode
      - name: Build the project
        run: npm run build
      - name: Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist folder
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist
      - name: Deploying dist folder
        run: |
          echo "Deploying dist folder..."
          ls dist/
          echo "Deployment successful!"

  

