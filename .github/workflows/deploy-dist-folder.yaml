name: run test
on:
  push:
    branches: [main]
    path_ignore:  
    - ".github/workflows**"
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js and install dependencies
        uses: ./.github/action/setupnode
      - name: Run tests
        run: npm test
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js and install dependencies
        uses: ./.github/action/setupnode
      - name: Build the project
        run: npm run build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Cloning the repository
        uses: actions/checkout@v6
  

